steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/jobmitra-backend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/jobmitra-backend:latest
      - .

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jobmitra-backend:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jobmitra-backend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jobmitra-backend-dev
      - --image=gcr.io/$PROJECT_ID/jobmitra-backend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=APP_ENV=dev
      - --update-secrets=MONGO_URI=MONGO_URI:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,CORS_ORIGINS=CORS_ORIGINS:latest,FRONTEND_URL=FRONTEND_URL:latest

images:
  - gcr.io/$PROJECT_ID/jobmitra-backend:$SHORT_SHA
  - gcr.io/$PROJECT_ID/jobmitra-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
